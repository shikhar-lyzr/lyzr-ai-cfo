name: lyzr-ai-cfo
description: Finance Action Engine — proactive variance review and financial analysis
version: "1.0"

model:
  preferred: "lyzr:default@https://agent-prod.studio.lyzr.ai/v4"

tools:
  - search_records
  - analyze_financial_data
  - create_actions
  - update_action
  - generate_commentary
  - draft_email
  - scan_ar_aging
  - create_ar_actions
  - draft_dunning_email
  - update_invoice_status
  - generate_variance_report
  - generate_ar_summary
  - save_document

runtime:
  max_turns: 10
  timeout: 120000

settings:
  temperature: 0.3
